[build]
builder = "NIXPACKS"
buildCommand = "python -m pip install -r backend-py/requirements.txt"

[deploy]
startCommand = "cd backend-py && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]
