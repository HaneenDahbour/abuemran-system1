[build]
builder = "NIXPACKS"
buildCommand = "cd backend-py && python -m pip install --upgrade pip && python -m pip install -r requirements.txt"

[deploy]
startCommand = "cd backend-py && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]
