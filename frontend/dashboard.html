<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام ابو عمران — لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f4f3f0;
      --sur: #fff;
      --sur2: #faf9f7;
      --brd: rgba(0, 0, 0, .08);
      --brdm: rgba(0, 0, 0, .14);
      --tx: #181715;
      --tx2: #6a6862;
      --tx3: #9e9b96;
      --bl: #1a56db;
      --bll: #eff6ff;
      --bld: #1e40af;
      --gr: #057a55;
      --grl: #f0fdf4;
      --am: #92400e;
      --aml: #fffbeb;
      --rd: #c81e1e;
      --rdl: #fef2f2;
      --r: 10px;
      --rl: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      font-size: 14px
    }

    .hidden {
      display: none !important
    }

    .app {
      max-width: 1140px;
      margin: 0 auto;
      padding: 1rem
    }

    .topbar {
      background: var(--sur);
      border: 1px solid var(--brd);
      border-radius: var(--rl);
      padding: 10px 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .06)
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700
    }

    .badge-live {
      font-size: 10px;
      font-weight: 700;
      color: var(--gr);
      background: var(--grl);
      padding: 2px 8px;
      border-radius: 8px
    }

    .fb {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700
    }

    .btn-out {
      border: 1px solid var(--brdm);
      background: transparent;
      border-radius: var(--r);
      padding: 6px 12px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      color: var(--tx2)
    }

    .btn-out:hover {
      background: var(--bg)
    }

    .notif-btn {
      position: relative;
      border: 1px solid var(--brdm);
      border-radius: var(--r);
      padding: 6px 10px;
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      font-size: 14px
    }

    .nc {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--rd);
      color: #fff;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border: 2px solid var(--sur)
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="brand">
        <span>📦</span>
        <span>نظام ابو عمران</span>
        <span class="badge-live">🟢 متصل بالسيرفر</span>
      </div>
      <div class="fb">
        <button class="notif-btn">
          🔔<span class="nc hidden" id="nc">0</span>
        </button>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:600" id="topName">...</div>
          <div style="font-size:11px;color:var(--tx3)" id="topRole"></div>
        </div>
        <div class="av" id="topAv">?</div>
        <button class="btn-out" onclick="doLogout()">خروج</button>
      </div>
    </div>

    <!-- المحتوى الرئيسي — يُملأ من dashboard.js -->
    <div id="mainContent">
      <div style="text-align:center;padding:4rem;color:var(--tx3)">⏳ جاري التحميل...</div>
    </div>
  </div>

  <!-- الترتيب مهم: api.js ← auth.js ← dashboard.js -->
  <script src="js/api.js?v=fix-20260622d"></script>
  <script src="js/auth.js?v=fix-20260622c"></script>
  <script src="js/dashboard.js?v=fix-20260622d"></script>
</body>

</html>
