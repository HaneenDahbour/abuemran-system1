<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول للمحلات — نظام أبو عمران</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ── Shops module — extra styles ── */
    .shop-app { display: flex; min-height: 100vh; }

    .shop-sidebar {
      width: 260px;
      background: var(--ink);
      color: #fff;
      padding: 18px 14px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .shop-sidebar h2 { font-size: 16px; font-weight: 700; }
    .shop-sidebar .who { font-size: 12px; color: rgba(255,255,255,.6); }

    .shop-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      font-size: 13px; color: rgba(255,255,255,.85);
      transition: var(--transition);
    }
    .shop-nav-item:hover, .shop-nav-item.active { background: rgba(255,255,255,.12); color: #fff; }
    .shop-nav-item .badge-count {
      margin-right: auto; background: rgba(255,255,255,.15); border-radius: 999px;
      font-size: 11px; padding: 1px 8px;
    }

    .shop-main { flex: 1; padding: 22px; max-width: 100%; overflow-x: auto; }

    .shop-cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px;
    }

    .shop-card {
      background: var(--sur2); border: 1px solid var(--brd); border-radius: var(--rl);
      padding: 16px; cursor: pointer; transition: var(--transition); box-shadow: var(--shadow);
    }
    .shop-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .shop-card .icon { font-size: 28px; margin-bottom: 6px; }
    .shop-card .title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .shop-card .sub { font-size: 12px; color: var(--tx2); }

    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .stat-box {
      background: var(--sur2); border: 1px solid var(--brd); border-radius: var(--r);
      padding: 14px; box-shadow: var(--shadow);
    }
    .stat-box .label { font-size: 12px; color: var(--tx2); margin-bottom: 6px; }
    .stat-box .value { font-size: 20px; font-weight: 700; }
    .stat-box.green .value { color: var(--gr); }
    .stat-box.red .value { color: var(--rd); }
    .stat-box.blue .value { color: var(--bl); }

    .shop-tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--brd); margin-bottom: 16px; flex-wrap: wrap; }
    .shop-tab {
      padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--tx2);
      border-bottom: 2px solid transparent; transition: var(--transition);
    }
    .shop-tab:hover { color: var(--tx); }
    .shop-tab.active { color: var(--bl); border-color: var(--bl); }

    .data-table { width: 100%; border-collapse: collapse; background: var(--sur2); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); font-size: 13px; }
    .data-table th, .data-table td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--brd); }
    .data-table th { background: var(--sur); font-weight: 700; color: var(--tx2); font-size: 12px; }
    .data-table tbody tr:hover { background: var(--sur); }
    .data-table .empty-row td { text-align: center; color: var(--tx3); padding: 24px; }

    .icon-btn { border: none; background: none; cursor: pointer; font-size: 15px; padding: 4px 6px; border-radius: 6px; }
    .icon-btn:hover { background: var(--brd); }

    .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
    .panel-head h3 { font-size: 16px; font-weight: 700; }

    .breadcrumb { display: flex; gap: 6px; align-items: center; font-size: 13px; color: var(--tx2); margin-bottom: 16px; flex-wrap: wrap; }
    .breadcrumb a { color: var(--bl); cursor: pointer; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    @media (max-width: 800px) {
      .shop-app { flex-direction: column; }
      .shop-sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
    }
  </style>
</head>

<body>
  <div id="toast-wrap" style="position:fixed;top:16px;left:16px;z-index:100000"></div>

  <!-- ═══════════ LOGIN PAGE ═══════════ -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-logo">🏬</div>
      <h1 class="login-title">تسجيل الدخول للمحلات</h1>
      <p style="text-align:center;color:var(--tx2);font-size:13px;margin-bottom:18px">نظام أبو عمران — قسم المحلات</p>

      <div class="form-group">
        <label class="form-label">اسم المستخدم</label>
        <input class="form-input" id="lu" type="text" autocomplete="username" />
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input class="form-input" id="lp" type="password" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="login-btn" style="margin-top:8px">تسجيل الدخول</button>
      <div id="login-err" style="color:var(--rd);font-size:12px;margin-top:10px;text-align:center"></div>

      <div style="text-align:center;margin-top:18px">
        <a href="index.html" style="font-size:12px;color:var(--tx3)">العودة للنظام الرئيسي</a>
      </div>
    </div>
  </div>

  <!-- ═══════════ APP ═══════════ -->
  <div id="app" class="shop-app hidden">
    <aside class="shop-sidebar">
      <h2>🏬 المحلات</h2>
      <div class="who" id="who"></div>
      <div id="sidebarNav" style="display:flex;flex-direction:column;gap:4px;margin-top:6px"></div>
      <div style="flex:1"></div>
      <div class="shop-nav-item" onclick="doShopLogout()">🚪 تسجيل الخروج</div>
    </aside>
    <main class="shop-main" id="main"></main>
  </div>

  <script>
    /* ════════════════════════════════════
       API base + fetch helper (separate auth from main system)
    ════════════════════════════════════ */
    const API_BASE = (() => {
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      return isLocal ? 'http://localhost:8000/api' : '/api';
    })();

    function getShopToken() { try { return localStorage.getItem('shop_token'); } catch { return null; } }
    function getShopUser() { try { return JSON.parse(localStorage.getItem('shop_user') || 'null'); } catch { return null; } }

    function doShopLogout() {
      localStorage.removeItem('shop_token');
      localStorage.removeItem('shop_user');
      location.href = 'portal.html';
    }

    async function api(path, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (!headers['Content-Type'] && !(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';
      const token = getShopToken();
      if (token) headers.Authorization = `Bearer ${token}`;
      let res;
      try {
        res = await fetch(`${API_BASE}${path}`, { ...options, headers, cache: 'no-store' });
      } catch {
        throw new Error('لا يمكن الاتصال بالخادم');
      }
      if (res.status === 401) { doShopLogout(); throw new Error('انتهت الجلسة'); }
      const ct = res.headers.get('content-type') || '';
      const data = ct.includes('application/json') ? await res.json().catch(() => null) : await res.text();
      if (!res.ok) {
        const msg = (data && (data.detail || data.message)) || `HTTP ${res.status}`;
        throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
      }
      return data;
    }

    /* ════════════════════════════════════
       Small helpers (toast / modal / fmt)
    ════════════════════════════════════ */
    function fmt(v) {
      return Number(v || 0).toLocaleString('en-US', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
    }
    function fmtDate(v) {
      if (!v) return '—';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return String(v);
      return d.toLocaleDateString('ar-JO-u-nu-latn', { year: 'numeric', month: 'short', day: 'numeric' });
    }
    function escHtml(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function toast(message, type = 'info') {
      const wrap = document.getElementById('toast-wrap');
      const colors = { success: '#0a7650', error: '#b42318', info: '#1a4fd6', warning: '#b54708' };
      const el = document.createElement('div');
      el.style.cssText = `background:#fff;color:#1a1815;border-right:4px solid ${colors[type] || colors.info};box-shadow:0 10px 28px rgba(0,0,0,.14);border-radius:12px;padding:12px 14px;margin-top:10px;min-width:220px;max-width:360px;font-size:13px;line-height:1.5;`;
      el.textContent = message;
      wrap.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }, 2800);
    }
    function openModal(html, width = '520px') {
      closeModal();
      const overlay = document.createElement('div');
      overlay.id = 'modal-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
      const modal = document.createElement('div');
      modal.id = 'modal-box';
      modal.style.cssText = `width:min(${width},96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:18px;direction:rtl;`;
      modal.innerHTML = html;
      overlay.appendChild(modal);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      const o = document.getElementById('modal-overlay');
      if (o) o.remove();
      document.body.style.overflow = '';
    }
    function confirmDelete(msg, fn) {
      openModal(`
        <div class="modal-header"><div class="modal-title">🗑️ تأكيد الحذف</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <p style="margin-bottom:16px;font-size:13px">${escHtml(msg)}</p>
        <div style="display:flex;gap:10px">
          <button class="btn btn-danger" style="flex:1" id="confirm-del-btn">حذف</button>
          <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
        </div>`, '420px');
      document.getElementById('confirm-del-btn').onclick = async () => {
        try { await fn(); closeModal(); } catch (e) { toast(e.message, 'error'); }
      };
    }

    /* ════════════════════════════════════
       Auth bootstrap
    ════════════════════════════════════ */
    let CURRENT = { categories: [], shops: [], view: 'home', shopId: null, tab: 'cash' };

    document.addEventListener('DOMContentLoaded', () => {
      const token = getShopToken();
      const user = getShopUser();
      if (token && user) {
        if (!['shop_manager', 'shop_employee', 'admin', 'accountant'].includes(user.role) && !user.shop_id) {
          toast('هذا الحساب لا يملك صلاحية الوصول لقسم المحلات', 'error');
          doShopLogout();
          return;
        }
        showApp();
      } else {
        location.href = 'portal.html';
      }
    });

    async function login() {
      const u = document.getElementById('lu').value.trim();
      const p = document.getElementById('lp').value;
      const errEl = document.getElementById('login-err');
      errEl.textContent = '';
      if (!u || !p) { errEl.textContent = 'الرجاء تعبئة جميع الحقول'; return; }
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'جاري التحقق...';
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data?.token) throw new Error(data?.detail || 'بيانات الدخول غير صحيحة');
        if (!['shop_manager', 'shop_employee', 'admin', 'accountant'].includes(data.user.role) && !data.user.shop_id) {
          throw new Error('هذا الحساب لا يملك صلاحية الوصول لقسم المحلات');
        }
        localStorage.setItem('shop_token', data.token);
        localStorage.setItem('shop_user', JSON.stringify(data.user));
        location.reload();
      } catch (e) {
        errEl.textContent = e.message;
      } finally {
        btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      }
    }

    function isManager() {
      const r = getShopUser()?.role;
      return r === 'admin' || r === 'accountant' || r === 'shop_manager';
    }
    function isAdminLike() {
      const r = getShopUser()?.role;
      return r === 'admin' || r === 'accountant';
    }

    /* ════════════════════════════════════
       App shell
    ════════════════════════════════════ */
    async function showApp() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      const user = getShopUser();
      const roleLabels = { admin: 'مدير عام', accountant: 'محاسب', shop_manager: 'مدير محل', shop_employee: 'موظف محل', employee: 'موظف' };
      document.getElementById('who').textContent = `${user.full_name} — ${roleLabels[user.role] || user.role}`;

      await loadCategories();

      if (!isAdminLike() && user.shop_id) {
        // shop employee/manager: go straight to their shop
        openShop(user.shop_id);
      } else {
        renderSidebar();
        renderHome();
      }
    }

    async function loadCategories() {
      try {
        CURRENT.categories = await api('/shops/categories');
      } catch (e) { toast(e.message, 'error'); CURRENT.categories = []; }
      try {
        CURRENT.shops = await api('/shops');
      } catch (e) { toast(e.message, 'error'); CURRENT.shops = []; }
    }

    function renderSidebar() {
      const nav = document.getElementById('sidebarNav');
      if (!isAdminLike()) { nav.innerHTML = ''; return; }
      let html = `<div class="shop-nav-item ${CURRENT.view === 'home' ? 'active' : ''}" onclick="renderHome()">🏠 الرئيسية</div>`;
      CURRENT.categories.forEach(c => {
        const count = CURRENT.shops.filter(s => s.category_id === c.id).length;
        html += `<div class="shop-nav-item" onclick="renderCategory(${c.id})">${c.icon || '🏬'} ${escHtml(c.name)}<span class="badge-count">${count}</span></div>`;
      });
      html += `<div class="shop-nav-item" onclick="manageCategoriesModal()">⚙️ إدارة الفئات</div>`;
      nav.innerHTML = html;
    }

    /* ════════════════════════════════════
       Home / categories / shops list
    ════════════════════════════════════ */
    function renderHome() {
      CURRENT.view = 'home';
      renderSidebar();
      const main = document.getElementById('main');
      if (!CURRENT.categories.length) {
        main.innerHTML = `
          <div class="panel-head"><h3>فئات المحلات</h3>${isAdminLike() ? `<button class="btn btn-primary" onclick="categoryFormModal()">+ إضافة فئة</button>` : ''}</div>
          <div class="data-table"><table class="data-table"><tbody><tr class="empty-row"><td>لا توجد فئات بعد</td></tr></tbody></table></div>`;
        return;
      }
      let cards = CURRENT.categories.map(c => {
        const shops = CURRENT.shops.filter(s => s.category_id === c.id);
        return `<div class="shop-card" onclick="renderCategory(${c.id})">
          <div class="icon">${c.icon || '🏬'}</div>
          <div class="title">${escHtml(c.name)}</div>
          <div class="sub">${shops.length} محل</div>
        </div>`;
      }).join('');
      main.innerHTML = `
        <div class="panel-head">
          <h3>فئات المحلات</h3>
          ${isAdminLike() ? `<button class="btn btn-primary" onclick="categoryFormModal()">+ إضافة فئة</button>` : ''}
        </div>
        <div class="shop-cards-grid">${cards}</div>
      `;
    }

    function renderCategory(catId) {
      CURRENT.view = 'category';
      const cat = CURRENT.categories.find(c => c.id === catId);
      if (!cat) return renderHome();
      const shops = CURRENT.shops.filter(s => s.category_id === catId);
      const main = document.getElementById('main');
      let cards = shops.map(s => `
        <div class="shop-card" onclick="openShop(${s.id})">
          <div class="icon">🏪</div>
          <div class="title">${escHtml(s.name)}</div>
          <div class="sub">المسؤول: ${escHtml(s.responsible_employee_name || s.responsible_name || '—')}</div>
          <div class="sub" style="margin-top:6px;color:var(--gr);font-weight:700">الصندوق: ${fmt(s.cash.balance)} د.أ</div>
        </div>`).join('') || `<div style="color:var(--tx3);font-size:13px">لا توجد محلات في هذه الفئة</div>`;
      main.innerHTML = `
        <div class="breadcrumb"><a onclick="renderHome()">الرئيسية</a> / ${escHtml(cat.name)}</div>
        <div class="panel-head">
          <h3>${cat.icon || '🏬'} ${escHtml(cat.name)}</h3>
          ${isAdminLike() ? `<button class="btn btn-primary" onclick="shopFormModal(null, ${cat.id})">+ إضافة محل</button>` : ''}
        </div>
        <div class="shop-cards-grid">${cards}</div>
      `;
    }

    /* ════════════════════════════════════
       Category management
    ════════════════════════════════════ */
    function manageCategoriesModal() {
      let rows = CURRENT.categories.map(c => `
        <tr>
          <td>${c.icon || '🏬'}</td>
          <td>${escHtml(c.name)}</td>
          <td>${c.shops_count || 0}</td>
          <td>
            <button class="icon-btn" onclick="categoryFormModal(${c.id})">✏️</button>
            <button class="icon-btn" onclick="deleteCategory(${c.id})">🗑️</button>
          </td>
        </tr>`).join('') || `<tr class="empty-row"><td colspan="4">لا توجد فئات</td></tr>`;
      openModal(`
        <div class="modal-header"><div class="modal-title">⚙️ إدارة فئات المحلات</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div style="margin-bottom:12px"><button class="btn btn-primary btn-sm" onclick="categoryFormModal()">+ فئة جديدة</button></div>
        <table class="data-table"><thead><tr><th>أيقونة</th><th>الاسم</th><th>عدد المحلات</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      `, '560px');
    }

    function categoryFormModal(id) {
      const cat = id ? CURRENT.categories.find(c => c.id === id) : null;
      openModal(`
        <div class="modal-header"><div class="modal-title">${cat ? '✏️ تعديل فئة' : '+ فئة جديدة'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="form-group"><label class="form-label">الاسم</label><input class="form-input" id="cat-name" value="${escHtml(cat?.name || '')}"></div>
        <div class="form-group"><label class="form-label">أيقونة (emoji)</label><input class="form-input" id="cat-icon" value="${escHtml(cat?.icon || '🏬')}"></div>
        <div class="form-group"><label class="form-label">ملاحظات</label><textarea class="form-input" id="cat-notes">${escHtml(cat?.notes || '')}</textarea></div>
        <button class="btn btn-primary btn-full" id="cat-save">${cat ? 'حفظ' : 'إضافة'}</button>
      `, '460px');
      document.getElementById('cat-save').onclick = async () => {
        const body = {
          name: document.getElementById('cat-name').value.trim(),
          icon: document.getElementById('cat-icon').value.trim() || '🏬',
          notes: document.getElementById('cat-notes').value.trim(),
        };
        if (!body.name) return toast('الاسم مطلوب', 'error');
        try {
          if (cat) await api(`/shops/categories/${cat.id}`, { method: 'PUT', body: JSON.stringify(body) });
          else await api('/shops/categories', { method: 'POST', body: JSON.stringify(body) });
          await loadCategories();
          closeModal();
          toast('تم الحفظ', 'success');
          renderSidebar();
          if (CURRENT.view === 'home') renderHome();
          else manageCategoriesModal();
        } catch (e) { toast(e.message, 'error'); }
      };
    }

    function deleteCategory(id) {
      confirmDelete('سيتم حذف الفئة. لا يمكن الحذف إن كانت تحتوي محلات.', async () => {
        await api(`/shops/categories/${id}`, { method: 'DELETE' });
        await loadCategories();
        toast('تم الحذف', 'success');
        renderSidebar();
        renderHome();
      });
    }

    /* ════════════════════════════════════
       Shop create / edit
    ════════════════════════════════════ */
    let EMPLOYEES_CACHE = null;
    async function getEmployees() {
      if (EMPLOYEES_CACHE) return EMPLOYEES_CACHE;
      try { EMPLOYEES_CACHE = await api('/auth/employees-list'); } catch { EMPLOYEES_CACHE = []; }
      return EMPLOYEES_CACHE;
    }

    async function shopFormModal(shopId, defaultCatId) {
      const shop = shopId ? CURRENT.shops.find(s => s.id === shopId) : null;
      const employees = await getEmployees();
      const catOptions = CURRENT.categories.map(c =>
        `<option value="${c.id}" ${((shop?.category_id || defaultCatId) === c.id) ? 'selected' : ''}>${escHtml(c.icon || '')} ${escHtml(c.name)}</option>`
      ).join('');
      const empOptions = `<option value="">— بدون —</option>` + employees.map(e =>
        `<option value="${e.id}" ${shop?.responsible_employee_id === e.id ? 'selected' : ''}>${escHtml(e.full_name)}</option>`
      ).join('');
      openModal(`
        <div class="modal-header"><div class="modal-title">${shop ? '✏️ تعديل محل' : '+ محل جديد'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="form-group"><label class="form-label">الفئة</label><select class="form-input" id="sh-cat">${catOptions}</select></div>
        <div class="form-group"><label class="form-label">اسم المحل</label><input class="form-input" id="sh-name" value="${escHtml(shop?.name || '')}"></div>
        <div class="form-group"><label class="form-label">الموظف المسؤول (من حسابات النظام)</label><select class="form-input" id="sh-emp">${empOptions}</select></div>
        <div class="form-group"><label class="form-label">اسم المسؤول (إن لم يكن له حساب)</label><input class="form-input" id="sh-resp" value="${escHtml(shop?.responsible_name || '')}"></div>
        <div class="form-group"><label class="form-label">الموقع</label><input class="form-input" id="sh-loc" value="${escHtml(shop?.location || '')}"></div>
        <div class="form-group"><label class="form-label">هاتف</label><input class="form-input" id="sh-phone" value="${escHtml(shop?.phone || '')}"></div>
        <div class="form-group"><label class="form-label">ملاحظات</label><textarea class="form-input" id="sh-notes">${escHtml(shop?.notes || '')}</textarea></div>
        <button class="btn btn-primary btn-full" id="sh-save">${shop ? 'حفظ' : 'إضافة'}</button>
      `, '500px');
      document.getElementById('sh-save').onclick = async () => {
        const body = {
          category_id: Number(document.getElementById('sh-cat').value),
          name: document.getElementById('sh-name').value.trim(),
          responsible_employee_id: document.getElementById('sh-emp').value ? Number(document.getElementById('sh-emp').value) : null,
          responsible_name: document.getElementById('sh-resp').value.trim(),
          location: document.getElementById('sh-loc').value.trim(),
          phone: document.getElementById('sh-phone').value.trim(),
          notes: document.getElementById('sh-notes').value.trim(),
          is_active: true,
        };
        if (!body.name) return toast('اسم المحل مطلوب', 'error');
        try {
          if (shop) await api(`/shops/${shop.id}`, { method: 'PUT', body: JSON.stringify(body) });
          else await api('/shops', { method: 'POST', body: JSON.stringify(body) });
          await loadCategories();
          closeModal();
          toast('تم الحفظ', 'success');
          if (shop) openShop(shop.id);
          else renderCategory(body.category_id);
        } catch (e) { toast(e.message, 'error'); }

    function deleteShop(shopId) {
      confirmDelete('سيتم حذف المحل وكل بياناته (موردين، مشتريات، شيكات، مصاريف، صندوق). هذا إجراء نهائي.', async () => {
        const shop = CURRENT.shops.find(s => s.id === shopId);
        await api(`/shops/${shopId}`, { method: 'DELETE' });
        await loadCategories();
        toast('تم الحذف', 'success');
        renderSidebar();
        if (shop) renderCategory(shop.category_id); else renderHome();
      });
    }

    /* ════════════════════════════════════
       Shop detail
    ════════════════════════════════════ */
    let SHOP_DETAIL = null;

    async function openShop(shopId) {
      CURRENT.view = 'shop';
      CURRENT.shopId = shopId;
      CURRENT.tab = 'cash';
      try {
        SHOP_DETAIL = await api(`/shops/${shopId}`);
      } catch (e) {
        toast(e.message, 'error');
        return renderHome();
      }
      renderSidebar();
      renderShopDetail();
    }

    async function refreshShop() {
      SHOP_DETAIL = await api(`/shops/${CURRENT.shopId}`);
      const shopIdx = CURRENT.shops.findIndex(s => s.id === CURRENT.shopId);
      if (shopIdx >= 0) {
        CURRENT.shops[shopIdx].cash = SHOP_DETAIL.cash;
      }
      renderShopDetail();
    }

    function renderShopDetail() {
      const { shop, cash, totals } = SHOP_DETAIL;
      const main = document.getElementById('main');
      const tabs = [
        ['cash', '💰 الصندوق اليومي'],
        ['purchases', '🧾 المشتريات'],
        ['suppliers', '🏭 الموردين'],
        ['checks', '🏦 الشيكات'],
        ['expenses', '👥 الرواتب والمصاريف'],
      ];
      main.innerHTML = `
        <div class="breadcrumb">
          ${isAdminLike() ? `<a onclick="renderHome()">الرئيسية</a> / <a onclick="renderCategory(${shop.category_id})">${escHtml(shop.category_name)}</a> / ` : ''}
          ${escHtml(shop.name)}
        </div>
        <div class="panel-head">
          <h3>${shop.category_icon || '🏪'} ${escHtml(shop.name)}</h3>
          ${isAdminLike() ? `
            <div style="display:flex;gap:8px">
              <button class="btn btn-ghost btn-sm" onclick="shopFormModal(${shop.id})">✏️ تعديل المحل</button>
              <button class="btn btn-danger btn-sm" onclick="deleteShop(${shop.id})">🗑️ حذف</button>
            </div>` : ''}
        </div>
        <div style="font-size:12px;color:var(--tx2);margin-bottom:14px">
          المسؤول: ${escHtml(shop.responsible_employee_name || shop.responsible_name || '—')}
          ${shop.phone ? ' | هاتف: ' + escHtml(shop.phone) : ''}
          ${shop.location ? ' | الموقع: ' + escHtml(shop.location) : ''}
        </div>

        <div class="stat-row">
          <div class="stat-box green"><div class="label">رصيد الصندوق</div><div class="value">${fmt(cash.balance)} د.أ</div></div>
          <div class="stat-box blue"><div class="label">إجمالي الإيداعات</div><div class="value">${fmt(cash.total_deposits)}</div></div>
          <div class="stat-box blue"><div class="label">إجمالي المقبوضات</div><div class="value">${fmt(cash.total_income)}</div></div>
          <div class="stat-box red"><div class="label">مصاريف من الصندوق</div><div class="value">${fmt(cash.total_cash_expenses)}</div></div>
          <div class="stat-box red"><div class="label">إجمالي المشتريات</div><div class="value">${fmt(totals.total_purchases)}</div></div>
          <div class="stat-box red"><div class="label">إجمالي الشيكات</div><div class="value">${fmt(totals.total_checks)}</div></div>
        </div>

        <div class="shop-tabs">
          ${tabs.map(([k, l]) => `<div class="shop-tab ${CURRENT.tab === k ? 'active' : ''}" onclick="switchTab('${k}')">${l}</div>`).join('')}
        </div>
        <div id="tabContent"></div>
      `;
      renderTab();
    }

    function switchTab(tab) {
      CURRENT.tab = tab;
      renderShopDetail();
    }

    function renderTab() {
      const el = document.getElementById('tabContent');
      switch (CURRENT.tab) {
        case 'cash': return renderCashTab(el);
        case 'purchases': return renderPurchasesTab(el);
        case 'suppliers': return renderSuppliersTab(el);
        case 'checks': return renderChecksTab(el);
        case 'expenses': return renderExpensesTab(el);
      }
    }

    /* ── Cash tab ── */
    function renderCashTab(el) {
      const typeLabels = { deposit: '🟢 إيداع من الإدارة', income: '🔵 مقبوضات اليوم', expense: '🔴 مصروف من الصندوق' };
      const rows = SHOP_DETAIL.cash_transactions.map(t => `
        <tr>
          <td>${fmtDate(t.trans_date)}</td>
          <td>${typeLabels[t.type] || t.type}</td>
          <td>${fmt(t.amount)}</td>
          <td>${escHtml(t.notes || '—')}</td>
          <td>
            ${isManager() ? `<button class="icon-btn" onclick="cashFormModal('${t.type}', ${t.id})">✏️</button>` : ''}
            ${isManager() ? `<button class="icon-btn" onclick="deleteCashTx(${t.id})">🗑️</button>` : ''}
          </td>
        </tr>`).join('') || `<tr class="empty-row"><td colspan="5">لا توجد حركات</td></tr>`;
      el.innerHTML = `
        <div class="panel-head">
          <h3>سجل الصندوق</h3>
          <div style="display:flex;gap:8px">
            ${isManager() ? `<button class="btn btn-primary btn-sm" onclick="cashFormModal('deposit')">+ إيداع جديد</button>` : ''}
            <button class="btn btn-ghost btn-sm" onclick="cashFormModal('income')">+ مقبوضات اليوم</button>
            <button class="btn btn-ghost btn-sm" onclick="cashFormModal('expense')">+ مصروف من الصندوق</button>
          </div>
        </div>
        <table class="data-table">
          <thead><tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>ملاحظات</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function cashFormModal(type, txId) {
      const tx = txId ? SHOP_DETAIL.cash_transactions.find(t => t.id === txId) : null;
      const titles = { deposit: '🟢 إضافة إيداع للصندوق', income: '🔵 تسجيل مقبوضات اليوم', expense: '🔴 تسجيل مصروف من الصندوق' };
      const title = tx ? `✏️ تعديل حركة الصندوق` : titles[type];
      openModal(`
        <div class="modal-header"><div class="modal-title">${title}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="form-group"><label class="form-label">المبلغ (د.أ)</label><input class="form-input" id="cs-amount" type="number" step="0.001" value="${tx ? tx.amount : ''}"></div>
        <div class="form-group"><label class="form-label">التاريخ</label><input class="form-input" id="cs-date" type="date" value="${tx ? String(tx.trans_date).slice(0,10) : new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label class="form-label">ملاحظات</label><textarea class="form-input" id="cs-notes">${escHtml(tx?.notes || '')}</textarea></div>
        <button class="btn btn-primary btn-full" id="cs-save">حفظ</button>
      `, '440px');
      document.getElementById('cs-save').onclick = async () => {
        const amount = Number(document.getElementById('cs-amount').value);
        if (!amount || amount <= 0) return toast('المبلغ يجب أن يكون أكبر من صفر', 'error');
        try {
          const body = JSON.stringify({
            type: tx ? tx.type : type, amount,
            trans_date: document.getElementById('cs-date').value,
            notes: document.getElementById('cs-notes').value.trim(),
          });
          if (tx) {
            await api(`/shops/${CURRENT.shopId}/cash/${tx.id}`, { method: 'PUT', body });
          } else {
            await api(`/shops/${CURRENT.shopId}/cash`, { method: 'POST', body });
          }
          closeModal();
          toast('تم الحفظ', 'success');
          await refreshShop();
        } catch (e) { toast(e.message, 'error'); }
      };
    }

    function deleteCashTx(id) {
      confirmDelete('سيتم حذف هذه الحركة من الصندوق.', async () => {
        await api(`/shops/${CURRENT.shopId}/cash/${id}`, { method: 'DELETE' });
        toast('تم الحذف', 'success');
        await refreshShop();
      });
    }

    /* ── Suppliers tab ── */
    function renderSuppliersTab(el) {
      const rows = SHOP_DETAIL.suppliers.map(s => `
        <tr>
          <td>${escHtml(s.name)}</td>
          <td>${escHtml(s.phone || '—')}</td>
          <td>${escHtml(s.notes || '—')}</td>

        await api(`/shops/${CURRENT.shopId}/suppliers/${id}`, { method: 'DELETE' });
        toast('تم الحذف', 'success');
        await refreshShop();
      });
    }

    /* ── Purchases tab ── */
    function renderPurchasesTab(el) {
      const rows = SHOP_DETAIL.purchases.map(p => `
        <tr>
          <td>${fmtDate(p.purchase_date)}</td>
          <td>${escHtml(p.supplier_full_name || p.supplier_name || '—')}</td>
          <td>${escHtml(p.invoice_number || '—')}</td>
          <td>${escHtml(p.description || '—')}</td>
          <td>${fmt(p.amount)}</td>
          <td>
            <button class="icon-btn" onclick="purchaseFormModal(${p.id})">✏️</button>
            <button class="icon-btn" onclick="deletePurchase(${p.id})">🗑️</button>
          </td>
        </tr>`).join('') || `<tr class="empty-row"><td colspan="6">لا توجد مشتريات</td></tr>`;
      el.innerHTML = `
        <div class="panel-head"><h3>المشتريات</h3><button class="btn btn-primary btn-sm" onclick="purchaseFormModal()">+ مشترى جديد</button></div>
        <table class="data-table"><thead><tr><th>التاريخ</th><th>المورد</th><th>رقم الفاتورة</th><th>الوصف</th><th>المبلغ</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      `;
    }

    function purchaseFormModal(id) {
      const p = id ? SHOP_DETAIL.purchases.find(x => x.id === id) : null;
      const supOptions = `<option value="">— بدون / اسم حر —</option>` + SHOP_DETAIL.suppliers.map(s =>
        `<option value="${s.id}" ${p?.supplier_id === s.id ? 'selected' : ''}>${escHtml(s.name)}</option>`).join('');
      openModal(`
        <div class="modal-header"><div class="modal-title">${p ? '✏️ تعديل مشترى' : '+ مشترى جديد'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="form-group"><label class="form-label">المورد (اختياري)</label><select class="form-input" id="pu-sup">${supOptions}</select></div>
        <div class="form-group"><label class="form-label">اسم المورد (إن لم يكن مسجلاً)</label><input class="form-input" id="pu-supname" value="${escHtml(p?.supplier_name || '')}"></div>
        <div class="form-group"><label class="form-label">رقم الفاتورة</label><input class="form-input" id="pu-inv" value="${escHtml(p?.invoice_number || '')}"></div>
        <div class="form-group"><label class="form-label">الوصف</label><input class="form-input" id="pu-desc" value="${escHtml(p?.description || '')}"></div>
        <div class="form-group"><label class="form-label">المبلغ (د.أ)</label><input class="form-input" id="pu-amount" type="number" step="0.001" value="${p?.amount ?? ''}"></div>
        <div class="form-group"><label class="form-label">التاريخ</label><input class="form-input" id="pu-date" type="date" value="${p?.purchase_date || new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label class="form-label">ملاحظات</label><textarea class="form-input" id="pu-notes">${escHtml(p?.notes || '')}</textarea></div>
        <button class="btn btn-primary btn-full" id="pu-save">${p ? 'حفظ' : 'إضافة'}</button>
      `, '500px');
      document.getElementById('pu-save').onclick = async () => {
        const amount = Number(document.getElementById('pu-amount').value);
        if (!amount || amount <= 0) return toast('المبلغ يجب أن يكون أكبر من صفر', 'error');
        const body = {
          supplier_id: document.getElementById('pu-sup').value ? Number(document.getElementById('pu-sup').value) : null,
          supplier_name: document.getElementById('pu-supname').value.trim(),
          invoice_number: document.getElementById('pu-inv').value.trim(),
          description: document.getElementById('pu-desc').value.trim(),
          amount,
          purchase_date: document.getElementById('pu-date').value,
          notes: document.getElementById('pu-notes').value.trim(),
        };
        try {
          if (p) await api(`/shops/${CURRENT.shopId}/purchases/${p.id}`, { method: 'PUT', body: JSON.stringify(body) });
          else await api(`/shops/${CURRENT.shopId}/purchases`, { method: 'POST', body: JSON.stringify(body) });
          closeModal();
          toast('تم الحفظ', 'success');
          await refreshShop();
        } catch (e) { toast(e.message, 'error'); }

        await api(`/shops/${CURRENT.shopId}/purchases/${id}`, { method: 'DELETE' });
        toast('تم الحذف', 'success');
        await refreshShop();
      });
    }

    /* ── Checks tab ── */
    function renderChecksTab(el) {
      const statusLabels = { pending: 'معلّق', cashed: 'تم الصرف', returned: 'مرتجع', cancelled: 'ملغي' };
      const statusColors = { pending: 'var(--am)', cashed: 'var(--gr)', returned: 'var(--rd)', cancelled: 'var(--tx3)' };
      const rows = SHOP_DETAIL.checks.map(c => `
        <tr>
          <td>${escHtml(c.check_number)}</td>
          <td>${escHtml(c.owner_name || '—')}</td>
          <td>${escHtml(c.bank_name || '—')}</td>
          <td>${fmt(c.amount)}</td>
          <td>${fmtDate(c.due_date)}</td>
          <td><span style="color:${statusColors[c.status]};font-weight:700">${statusLabels[c.status] || c.status}</span></td>
          <td>
            <select class="form-input" style="font-size:11px;padding:4px;width:auto" onchange="updateCheckStatus(${c.id}, this.value)">
              ${Object.entries(statusLabels).map(([k,l]) => `<option value="${k}" ${c.status===k?'selected':''}>${l}</option>`).join('')}
            </select>
            <button class="icon-btn" onclick="checkFormModal(${c.id})">✏️</button>
            ${isAdminLike() ? `<button class="icon-btn" onclick="deleteCheck(${c.id})">🗑️</button>` : ''}
          </td>
        </tr>`).join('') || `<tr class="empty-row"><td colspan="7">لا توجد شيكات</td></tr>`;
      el.innerHTML = `
        <div class="panel-head"><h3>الشيكات</h3><button class="btn btn-primary btn-sm" onclick="checkFormModal()">+ شيك جديد</button></div>
        <table class="data-table"><thead><tr><th>رقم الشيك</th><th>لمن</th><th>البنك</th><th>المبلغ</th><th>تاريخ الاستحقاق</th><th>الحالة</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      `;
    }

    function checkFormModal(id) {
      const c = id ? SHOP_DETAIL.checks.find(x => x.id === id) : null;
      openModal(`
        <div class="modal-header"><div class="modal-title">${c ? '✏️ تعديل شيك' : '+ شيك جديد'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="form-group"><label class="form-label">رقم الشيك</label><input class="form-input" id="ch-num" value="${escHtml(c?.check_number || '')}"></div>
        <div class="form-group"><label class="form-label">لمن (المورد/الشخص)</label><input class="form-input" id="ch-owner" value="${escHtml(c?.owner_name || '')}"></div>
        <div class="form-group"><label class="form-label">البنك</label><input class="form-input" id="ch-bank" value="${escHtml(c?.bank_name || '')}"></div>
        <div class="form-group"><label class="form-label">المبلغ (د.أ)</label><input class="form-input" id="ch-amount" type="number" step="0.001" value="${c?.amount ?? ''}"></div>
        <div class="form-group"><label class="form-label">تاريخ الاستحقاق</label><input class="form-input" id="ch-due" type="date" value="${c?.due_date || ''}"></div>
        <div class="form-group"><label class="form-label">ملاحظات</label><textarea class="form-input" id="ch-notes">${escHtml(c?.notes || '')}</textarea></div>
        <button class="btn btn-primary btn-full" id="ch-save">${c ? 'حفظ' : 'إضافة'}</button>
      `, '480px');
      document.getElementById('ch-save').onclick = async () => {
        const amount = Number(document.getElementById('ch-amount').value);
        const due = document.getElementById('ch-due').value;
        const num = document.getElementById('ch-num').value.trim();
        if (!num) return toast('رقم الشيك مطلوب', 'error');
        if (!amount || amount <= 0) return toast('المبلغ يجب أن يكون أكبر من صفر', 'error');
        if (!due) return toast('تاريخ الاستحقاق مطلوب', 'error');
        const body = {
          check_number: num,
          owner_name: document.getElementById('ch-owner').value.trim(),
          bank_name: document.getElementById('ch-bank').value.trim(),
          amount, due_date: due,
          notes: document.getElementById('ch-notes').value.trim(),
        };
        try {
          if (c) await api(`/shops/${CURRENT.shopId}/checks/${c.id}`, { method: 'PUT', body: JSON.stringify(body) });
          else await api(`/shops/${CURRENT.shopId}/checks`, { method: 'POST', body: JSON.stringify(body) });
          closeModal();
          toast('تم الحفظ', 'success');
          await refreshShop();
        } catch (e) { toast(e.message, 'error'); }
      };
    }

    async function updateCheckStatus(id, status) {
      try {
        await api(`/shops/${CURRENT.shopId}/checks/${id}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
        toast('تم تحديث الحالة', 'success');
        await refreshShop();
      } catch (e) { toast(e.message, 'error'); }
    }

    function deleteCheck(id) {
      confirmDelete('سيتم حذف الشيك.', async () => {
        await api(`/shops/${CURRENT.shopId}/checks/${id}`, { method: 'DELETE' });
        toast('تم الحذف', 'success');
        await refreshShop();
      });
    }

    /* ── Expenses tab ── */
    function renderExpensesTab(el) {
      const typeLabels = { salary: 'راتب', rent: 'إيجار', utility: 'فواتير/خدمات', other: 'أخرى' };
      const rows = SHOP_DETAIL.expenses.map(e => `
        <tr>
          <td>${fmtDate(e.expense_date)}</td>
          <td>${typeLabels[e.expense_type] || e.expense_type}</td>
          <td>${escHtml(e.title)}</td>
          <td>${escHtml(e.employee_name || '—')}</td>
          <td>${fmt(e.amount)}</td>
          <td>
            <button class="icon-btn" onclick="expenseFormModal(${e.id})">✏️</button>
            <button class="icon-btn" onclick="deleteExpense(${e.id})">🗑️</button>
          </td>
        </tr>`).join('') || `<tr class="empty-row"><td colspan="6">لا توجد مصاريف</td></tr>`;
      el.innerHTML = `
        <div class="panel-head"><h3>الرواتب والمصاريف</h3><button class="btn btn-primary btn-sm" onclick="expenseFormModal()">+ مصروف جديد</button></div>
        <table class="data-table"><thead><tr><th>التاريخ</th><th>النوع</th><th>العنوان</th><th>الموظف</th><th>المبلغ</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      `;
    }

    function expenseFormModal(id) {
      const e = id ? SHOP_DETAIL.expenses.find(x => x.id === id) : null;
      const typeOptions = { salary: 'راتب', rent: 'إيجار', utility: 'فواتير/خدمات', other: 'أخرى' };
      openModal(`
        <div class="modal-header"><div class="modal-title">${e ? '✏️ تعديل مصروف' : '+ مصروف جديد'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="form-group"><label class="form-label">النوع</label><select class="form-input" id="ex-type">
          ${Object.entries(typeOptions).map(([k,l]) => `<option value="${k}" ${e?.expense_type===k?'selected':''}>${l}</option>`).join('')}
        </select></div>
        <div class="form-group"><label class="form-label">العنوان</label><input class="form-input" id="ex-title" value="${escHtml(e?.title || '')}"></div>
        <div class="form-group"><label class="form-label">اسم الموظف (في حال راتب)</label><input class="form-input" id="ex-emp" value="${escHtml(e?.employee_name || '')}"></div>
        <div class="form-group"><label class="form-label">المبلغ (د.أ)</label><input class="form-input" id="ex-amount" type="number" step="0.001" value="${e?.amount ?? ''}"></div>
        <div class="form-group"><label class="form-label">التاريخ</label><input class="form-input" id="ex-date" type="date" value="${e?.expense_date || new Date().toISOString().slice(0,10)}"></div>
        <div class="form-group"><label class="form-label">ملاحظات</label><textarea class="form-input" id="ex-notes">${escHtml(e?.notes || '')}</textarea></div>
        <button class="btn btn-primary btn-full" id="ex-save">${e ? 'حفظ' : 'إضافة'}</button>
      `, '480px');
      document.getElementById('ex-save').onclick = async () => {
        const amount = Number(document.getElementById('ex-amount').value);
        const title = document.getElementById('ex-title').value.trim();
        if (!title) return toast('العنوان مطلوب', 'error');
        if (!amount || amount <= 0) return toast('المبلغ يجب أن يكون أكبر من صفر', 'error');
        const body = {
          expense_type: document.getElementById('ex-type').value,
          title,
          employee_name: document.getElementById('ex-emp').value.trim(),
          amount,
          expense_date: document.getElementById('ex-date').value,
          notes: document.getElementById('ex-notes').value.trim(),
        };
        try {
          if (e) await api(`/shops/${CURRENT.shopId}/expenses/${e.id}`, { method: 'PUT', body: JSON.stringify(body) });
          else await api(`/shops/${CURRENT.shopId}/expenses`, { method: 'POST', body: JSON.stringify(body) });
          closeModal();
          toast('تم الحفظ', 'success');
          await refreshShop();
        } catch (e2) { toast(e2.message, 'error'); }
      };
    }

    function deleteExpense(id) {
      confirmDelete('سيتم حذف المصروف.', async () => {
        await api(`/shops/${CURRENT.shopId}/expenses/${id}`, { method: 'DELETE' });
        toast('تم الحذف', 'success');
        await refreshShop();
      });
    }
  </script>
</body>

</html>
