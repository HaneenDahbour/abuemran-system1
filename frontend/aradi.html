<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الأراضي — نظام أبو عمران</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .ar-app{display:flex;min-height:100vh}
    .ar-sidebar{width:256px;background:var(--ink);color:#fff;padding:16px 12px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;position:sticky;top:0;height:100vh;overflow-y:auto}
    .ar-sidebar h2{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
    .ar-sidebar .who{font-size:11px;color:rgba(255,255,255,.55)}
    .ar-nav{display:flex;flex-direction:column;gap:2px;margin-top:4px;flex:1}
    .ar-nav-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:rgba(255,255,255,.3);padding:10px 10px 3px;margin-top:6px}
    .ar-nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:12.5px;color:rgba(255,255,255,.8);transition:.15s}
    .ar-nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
    .ar-nav-item.active{background:rgba(26,79,214,.35);color:#fff;font-weight:700}
    .ar-main{flex:1;padding:22px;background:var(--bg);overflow-x:auto;min-width:0}
    .metrics-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:20px}
    .mc{background:var(--sur2);border:1px solid var(--brd);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
    .mc.blue::before{background:linear-gradient(90deg,#1a4fd6,#3b82f6)}
    .mc.green::before{background:linear-gradient(90deg,#0a7650,#10b981)}
    .mc.red::before{background:linear-gradient(90deg,#c21515,#ef4444)}
    .mc.amber::before{background:linear-gradient(90deg,#9a4500,#f59e0b)}
    .mc.purple::before{background:linear-gradient(90deg,#6d28d9,#8b5cf6)}
    .mc .lbl{font-size:10.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
    .mc .val{font-size:22px;font-weight:800;letter-spacing:-1px}
    .mc .sub{font-size:11px;color:var(--tx3);margin-top:4px}
    .mc .ico{position:absolute;top:14px;left:16px;font-size:22px;opacity:.1}
    .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
    .ph h3{font-size:17px;font-weight:800}
    .ph .acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .tw{overflow-x:auto;border-radius:12px;border:1px solid var(--brd);background:var(--sur2);box-shadow:var(--shadow)}
    .tw table{width:100%;border-collapse:collapse}
    .tw thead th{background:#f7f5f2;padding:10px 14px;text-align:right;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);white-space:nowrap;border-bottom:1px solid var(--brd)}
    .tw tbody tr{border-top:1px solid rgba(0,0,0,.04);transition:.15s}
    .tw tbody tr:hover{background:rgba(26,79,214,.03)}
    .tw td{padding:11px 14px;font-size:13px}
    .tw .empty td{text-align:center;color:var(--tx3);padding:32px}
    .filter-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
    .ftab{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--brdm);color:var(--tx2);background:var(--sur2);transition:.15s}
    .ftab:hover{border-color:var(--bl);color:var(--bl)}
    .ftab.active{background:var(--bll);border-color:var(--bl);color:var(--bl)}
    .report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:6px}
    .report-card{background:var(--sur2);border:1px solid var(--brd);border-radius:12px;padding:20px;cursor:pointer;text-align:center;transition:.15s;box-shadow:var(--shadow)}
    .report-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(26,79,214,.3)}
    .report-card .ri{font-size:28px;margin-bottom:8px}
    .report-card .rt{font-weight:700;font-size:14px}
    .report-card .rs{font-size:11px;color:var(--tx3);margin-top:3px}
    .stmt-box{background:var(--bll);border:1px solid rgba(26,79,214,.2);border-radius:10px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .stmt-item .sl{font-size:11px;color:var(--tx3)}
    .stmt-item .sv{font-size:15px;font-weight:800}
    @media(max-width:800px){.ar-app{flex-direction:column}.ar-sidebar{width:100%;height:auto;position:relative}}
  </style>
</head>
<body>
<div id="toast-wrap" style="position:fixed;top:16px;left:16px;z-index:100000"></div>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-logo">🏞️</div>
    <h1 class="login-title">الأراضي</h1>
    <p style="text-align:center;color:rgba(255,255,255,.45);font-size:13px;margin-bottom:32px">نظام أبو عمران — قسم الأراضي</p>
    <div class="form-group">
      <label class="form-label">اسم المستخدم</label>
      <input class="form-input" id="lu" type="text" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input class="form-input" id="lp" type="password" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary btn-full btn-lg" id="login-btn" style="margin-top:8px">تسجيل الدخول</button>
    <div id="login-err" style="color:#ff8080;font-size:12px;margin-top:10px;text-align:center"></div>
    <div style="text-align:center;margin-top:18px">
      <a href="portal.html" style="font-size:12px;color:rgba(255,255,255,.4)">‹ البوابة الرئيسية</a>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="ar-app hidden">
  <aside class="ar-sidebar">
    <h2>🏞️ الأراضي</h2>
    <div class="who" id="who"></div>
    <nav class="ar-nav" id="sideNav"></nav>
    <div style="margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.1)">
      <div class="ar-nav-item" onclick="doLogout()">🚪 تسجيل الخروج</div>
    </div>
  </aside>
  <main class="ar-main" id="main"></main>
</div>

<script>
/* ════════════ CONFIG ════════════ */
const API_BASE = (() => {
  const h = location.hostname;
  return (h === 'localhost' || h === '127.0.0.1') ? 'http://localhost:8000/api' : '/api';
})();

let S = { section: 'dashboard', plots: [], buyers: [], investors: [], contracts: [] };

/* ════════════ AUTH ════════════ */
function getToken(){ try{ return localStorage.getItem('aradi_token'); }catch{ return null; } }
function getUser(){ try{ return JSON.parse(localStorage.getItem('aradi_user')||'null'); }catch{ return null; } }
function doLogout(){ localStorage.removeItem('aradi_token'); localStorage.removeItem('aradi_user'); location.href='portal.html'; }

/* ════════════ API ════════════ */
async function api(path, opts={}){
  const h={...(opts.headers||{})};
  if(!h['Content-Type']&&!(opts.body instanceof FormData)) h['Content-Type']='application/json';
  const t=getToken(); if(t) h.Authorization=`Bearer ${t}`;
  let res;
  try{ res=await fetch(`${API_BASE}${path}`,{...opts,headers:h,cache:'no-store'}); }
  catch{ throw new Error('لا يمكن الاتصال بالخادم'); }
  if(res.status===401){ doLogout(); throw new Error('انتهت الجلسة'); }
  const ct=res.headers.get('content-type')||'';
  const data=ct.includes('application/json')?await res.json().catch(()=>null):await res.text();
  if(!res.ok){ const m=(data&&(data.detail||data.message))||`HTTP ${res.status}`; throw new Error(typeof m==='string'?m:JSON.stringify(m)); }
  return data;
}

/* ════════════ HELPERS ════════════ */
function fmt(v){ return Number(v||0).toLocaleString('en-US',{minimumFractionDigits:3,maximumFractionDigits:3}); }
function cur(v){ return fmt(v)+' د'; }
function fmtDate(v){ if(!v) return '—'; const d=new Date(v); return isNaN(d)?String(v):d.toLocaleDateString('ar-JO-u-nu-latn',{year:'numeric',month:'short',day:'numeric'}); }
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,type='info'){
  const w=document.getElementById('toast-wrap');
  const c={success:'#0a7650',error:'#b42318',info:'#1a4fd6',warning:'#b54708'};
  const el=document.createElement('div');
  el.style.cssText=`background:#fff;color:#1a1815;border-right:4px solid ${c[type]||c.info};box-shadow:0 10px 28px rgba(0,0,0,.14);border-radius:12px;padding:12px 14px;margin-top:10px;min-width:220px;max-width:340px;font-size:13px;line-height:1.5;`;
  el.textContent=msg; w.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),200); },2800);
}
function openModal(html,w='540px'){
  closeModal();
  const ov=document.createElement('div'); ov.id='modal-ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;';
  const box=document.createElement('div'); box.id='modal-box';
  box.style.cssText=`width:min(${w},96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:22px;direction:rtl;animation:modalIn .2s cubic-bezier(.34,1.56,.64,1);`;
  box.innerHTML=html; ov.appendChild(box);
  ov.addEventListener('click',e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov); document.body.style.overflow='hidden';
}
function closeModal(){ const o=document.getElementById('modal-ov'); if(o) o.remove(); document.body.style.overflow=''; }
function confirm2(msg,fn){
  openModal(`<div class="modal-header"><div class="modal-title">تأكيد</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p style="margin-bottom:18px;font-size:13px">${esc(msg)}</p>
    <div style="display:flex;gap:10px"><button class="btn btn-danger" style="flex:1" id="cfbtn">تأكيد</button><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button></div>`,'400px');
  document.getElementById('cfbtn').onclick=async()=>{
    const b=document.getElementById('cfbtn'); if(b){b.disabled=true;b.textContent='جاري التنفيذ...';}
    try{ await fn(); closeModal(); }catch(e){ toast(e.message,'error'); if(b){b.disabled=false;b.textContent='تأكيد';} }
  };
}
function _lockSave(){ const b=document.querySelector('#modal-ov .btn-primary'); if(!b||b.disabled) return null; b.disabled=true; b.textContent='جاري الحفظ...'; return b; }
function _unlockSave(b){ if(b){b.disabled=false;b.textContent='💾 حفظ';} }

function statusBadge(s){
  const m={
    available:['badge-green','متاحة'],reserved:['badge-amber','محجوزة'],sold:['badge-blue','مباعة'],invested:['badge-blue','مستثمرة'],blocked:['badge-red','محظورة'],
    active:['badge-blue','نشط'],completed:['badge-green','مكتمل'],cancelled:['badge-gray','ملغي'],defaulted:['badge-red','متعثر'],closed:['badge-gray','مغلق'],
    pending:['badge-amber','معلقة'],confirmed:['badge-green','مؤكدة'],rejected:['badge-red','مرفوضة'],void:['badge-gray','ملغاة'],
    paid:['badge-green','مدفوعة'],partial:['badge-amber','جزئية'],overdue:['badge-red','متأخرة'],
    received:['badge-blue','مستلم'],deposited:['badge-amber','مودع'],cleared:['badge-green','مخلّص'],returned:['badge-red','مرتجع'],
  };
  const[cls,lbl]=m[s]||['badge-gray',s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function dirLabel(d){ return d==='in'?'<span class="badge badge-green">← داخل</span>':'<span class="badge badge-red">→ خارج</span>'; }

function methodLabel(m){
  return{cash:'نقد',check:'شيك',bank_transfer:'تحويل',other:'أخرى'}[m]||m;
}
function payTypeLabel(t){
  return{down_payment:'دفعة أولى',installment:'قسط',extra:'إضافي',correction:'تصحيح'}[t]||t;
}

/* ════════════ SIDEBAR ════════════ */
const SECTIONS=[
  {id:'dashboard',icon:'📊',label:'لوحة الأراضي'},
  {id:'plots',icon:'🗺️',label:'قطع الأراضي'},
  {id:'buyers',icon:'👤',label:'المشترين'},
  {id:'contracts',icon:'📋',label:'عقود البيع'},
  {id:'installments',icon:'📅',label:'الأقساط'},
  {id:'buyer_payments',icon:'💰',label:'دفعات المشترين'},
  {id:'investors',icon:'🤝',label:'المستثمرين'},
  {id:'investments',icon:'📈',label:'استثمارات المستثمرين'},
  {id:'investor_payments',icon:'💸',label:'دفعات المستثمرين'},
  {id:'checks',icon:'🧾',label:'الشيكات'},
  {id:'expenses',icon:'🧾',label:'مصاريف الأراضي'},
  {id:'reports',icon:'📑',label:'التقارير'},
];

function renderSidebar(){
  const nav=document.getElementById('sideNav');
  nav.innerHTML=SECTIONS.map(s=>`
    <div class="ar-nav-item ${S.section===s.id?'active':''}" onclick="nav('${s.id}')">
      <span>${s.icon}</span>${s.label}
    </div>`).join('');
}

function nav(sec){
  S.section=sec;
  renderSidebar();
  const fns={
    dashboard:loadDashboard,plots:loadPlots,buyers:loadBuyers,
    contracts:loadContracts,installments:loadInstallments,
    buyer_payments:loadBuyerPayments,investors:loadInvestors,
    investments:loadInvestments,investor_payments:loadInvestorPayments,
    checks:loadChecks,expenses:loadExpenses,reports:renderReports,
  };
  (fns[sec]||loadDashboard)();
}

function setMain(html){ document.getElementById('main').innerHTML=html; }
function loading(){ setMain('<div style="padding:40px;text-align:center;color:var(--tx3)">⏳ جاري التحميل...</div>'); }
function errPage(e){ setMain(`<div style="padding:40px;text-align:center;color:var(--rd)">⚠️ ${esc(e)}</div>`); }

/* ════════════ DASHBOARD ════════════ */
async function loadDashboard(){
  loading();
  try{
    const d=await api('/aradi/dashboard');
    setMain(`
      <div class="ph"><div><div class="page-title" style="font-size:20px;font-weight:800">لوحة الأراضي</div><div style="font-size:12px;color:var(--tx3);margin-top:2px">نظرة عامة على المشاريع</div></div></div>
      <div class="metrics-row">
        ${mc('blue','🗺️','عدد القطع',d.total_plots,'قطعة أرض')}
        ${mc('green','✅','القطع المتاحة',d.available_plots,'متاحة للبيع')}
        ${mc('blue','🏡','القطع المباعة',d.sold_plots,'مباعة')}
        ${mc('amber','🔖','القطع المحجوزة',d.reserved_plots,'محجوزة')}
        ${mc('green','💵','إجمالي المبيعات',cur(d.total_sale_price),'')}
        ${mc('green','💰','المقبوض من المشترين',cur(d.total_buyer_payments),'')}
        ${mc('red','⏳','المتبقي على المشترين',cur(d.total_remaining_from_buyers),'')}
        ${mc('red','⚠️','الأقساط المتأخرة',d.overdue_installments_count,'قسط متأخر')}
        ${mc('purple','🤝','مستحقات المستثمرين',cur(d.total_investor_due),'')}
        ${mc('amber','💸','المدفوع للمستثمرين',cur(d.total_investor_payments),'')}
        ${mc('red','🧾','مصاريف الأراضي',cur(d.total_expenses),'')}
        ${mc(parseFloat(d.net_cash||0)>=0?'green':'red','📊','صافي النقد',cur(d.net_cash),'')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px">
        <div class="card">
          <div class="card-title">⚡ اختصارات</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button class="btn btn-ghost btn-sm" onclick="nav('contracts')">📋 عقود البيع</button>
            <button class="btn btn-ghost btn-sm" onclick="nav('installments')">📅 الأقساط المستحقة</button>
            <button class="btn btn-ghost btn-sm" onclick="nav('reports')">📑 التقارير</button>
          </div>
        </div>
        <div class="card">
          <div class="card-title">💰 ملخص مالي</div>
          <table style="width:100%;font-size:13px">
            <tr><td style="color:var(--tx2);padding:5px 0">إجمالي رأس مال المستثمرين</td><td style="font-weight:700;text-align:left">${cur(d.total_investor_capital)}</td></tr>
            <tr><td style="color:var(--tx2);padding:5px 0">إجمالي أرباح المستثمرين</td><td style="font-weight:700;text-align:left">${cur(d.total_investor_profit)}</td></tr>
            <tr><td style="color:var(--tx2);padding:5px 0">المتبقي للمستثمرين</td><td style="font-weight:700;text-align:left;color:var(--rd)">${cur(d.remaining_investor_obligations)}</td></tr>
          </table>
        </div>
      </div>`);
  }catch(e){ errPage(e.message); }
}

function mc(color,icon,lbl,val,sub){
  return `<div class="mc ${color}"><div class="ico">${icon}</div><div class="lbl">${lbl}</div><div class="val">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}

/* ════════════ PLOTS ════════════ */
async function loadPlots(q=''){
  loading();
  try{
    S.plots=await api('/aradi/plots');
    renderPlots(q);
  }catch(e){ errPage(e.message); }
}

function renderPlots(q=''){
  let rows=S.plots;
  if(q) rows=rows.filter(r=>r.plot_number?.toLowerCase().includes(q.toLowerCase())||r.project_name?.toLowerCase().includes(q.toLowerCase())||r.location?.toLowerCase().includes(q.toLowerCase()));
  setMain(`
    <div class="ph">
      <div><div class="page-title" style="font-size:20px;font-weight:800">قطع الأراضي</div><div style="font-size:12px;color:var(--tx3)">${S.plots.length} قطعة</div></div>
      <div class="acts">
        <div class="search-bar"><span>🔍</span><input type="text" placeholder="ابحث برقم القطعة أو المشروع..." id="plot-q" value="${esc(q)}" oninput="renderPlots(this.value)"/></div>
        <button class="btn btn-primary btn-sm" onclick="showPlotForm()">+ إضافة قطعة</button>
      </div>
    </div>
    <div class="tw"><table>
      <thead><tr>
        <th>رقم القطعة</th><th>المشروع / المنطقة</th><th>المساحة م²</th>
        <th>سعر الشراء</th><th>سعر البيع المتوقع</th><th>الحالة</th><th>ملاحظات</th><th>إجراءات</th>
      </tr></thead>
      <tbody>${rows.length?rows.map(r=>`
        <tr>
          <td><strong>${esc(r.plot_number)}</strong></td>
          <td>${esc(r.project_name||'')} ${r.location?`<br><small style="color:var(--tx3)">${esc(r.location)}</small>`:''}</td>
          <td>${r.area?fmt(r.area):'—'}</td>
          <td>${cur(r.purchase_price)}</td>
          <td>${cur(r.expected_sale_price)}</td>
          <td>${statusBadge(r.status)}</td>
          <td style="max-width:150px;font-size:12px;color:var(--tx2)">${esc(r.notes||'')}</td>
          <td><div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="showPlotForm(${r.id})">✏️ تعديل</button>
            <button class="btn btn-danger btn-sm" onclick="deletePlot(${r.id},'${esc(r.plot_number)}')">🗑️ حذف</button>
          </div></td>
        </tr>`).join(''):`<tr class="empty"><td colspan="8">لا توجد قطع أراضي</td></tr>`}
      </tbody>
    </table></div>`);
}

async function showPlotForm(id=null){
  let p={status:'available'};
  if(id){ try{ p=S.plots.find(x=>x.id===id)||p; }catch{} }
  openModal(`
    <div class="modal-header"><div class="modal-title">${id?'تعديل قطعة':'إضافة قطعة أرض'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">رقم القطعة *</label><input class="form-input" id="pf-num" value="${esc(p.plot_number||'')}"/></div>
      <div class="form-group"><label class="form-label">اسم المشروع</label><input class="form-input" id="pf-proj" value="${esc(p.project_name||'')}"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">الموقع</label><input class="form-input" id="pf-loc" value="${esc(p.location||'')}"/></div>
      <div class="form-group"><label class="form-label">المساحة م²</label><input class="form-input" type="number" id="pf-area" value="${p.area||''}"/></div>
    </div>
    <div class="form-row">

async function loadInstallments(filter='all'){

function renderInstallments(rows,filter='all'){
  const today=new Date().toISOString().slice(0,10);
  const monthStart=today.slice(0,7)+'-01';
  const monthEnd=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).toISOString().slice(0,10);
  let filtered=rows;
  if(filter==='unpaid') filtered=rows.filter(r=>r.computed_status!=='paid');
  else if(filter==='partial') filtered=rows.filter(r=>r.computed_status==='partial');
  else if(filter==='paid') filtered=rows.filter(r=>r.computed_status==='paid');
  else if(filter==='overdue') filtered=rows.filter(r=>r.computed_status==='overdue');
  else if(filter==='month') filtered=rows.filter(r=>r.due_date>=monthStart&&r.due_date<=monthEnd);
  const tabs=[['all','الكل'],['unpaid','غير مدفوعة'],['partial','جزئية'],['paid','مدفوعة'],['overdue','متأخرة'],['month','هذا الشهر']];
  setMain(`
    <div class="ph"><div><div class="page-title" style="font-size:20px;font-weight:800">الأقساط</div></div></div>
    <div class="filter-tabs">${tabs.map(([k,l])=>`<div class="ftab ${filter===k?'active':''}" onclick="loadInstallments('${k}')">${l}</div>`).join('')}</div>
    <div class="tw"><table>
      <thead><tr><th>#</th><th>المشتري</th><th>رقم القطعة</th><th>تاريخ الاستحقاق</th><th>القيمة</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th>إجراءات</th></tr></thead>
      <tbody>${filtered.length?filtered.map(r=>`
        <tr>
          <td>${r.installment_number}</td>
          <td>${esc(r.buyer_name)}</td>
          <td>${esc(r.plot_number||'—')}</td>
          <td ${r.computed_status==='overdue'?'style="color:var(--rd);font-weight:700"':''}>${fmtDate(r.due_date)}</td>
          <td>${cur(r.amount)}</td>
          <td>${cur(r.paid)}</td>
          <td>${cur(r.remaining)}</td>
          <td>${statusBadge(r.computed_status)}</td>
          <td><div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-sm" onclick="showBuyerPayForm(${r.contract_id},${r.id},${r.remaining||r.amount})">💵 دفع</button>
            <button class="btn btn-ghost btn-sm" onclick="showInstallmentEdit(${r.id},${r.installment_number},'${r.due_date}',${r.amount},'${esc(r.notes||'')}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteInstallment(${r.id},${r.installment_number})">🗑️</button>
          </div></td>
        </tr>`).join(''):`<tr class="empty"><td colspan="9">لا توجد أقساط</td></tr>`}
      </tbody>
    </table></div>`);
}

async function runReport(type){
  const main=document.getElementById('main');
  const titles={'buyer-balances':'أرصدة المشترين','investor-balances':'أرصدة المستثمرين','overdue-installments':'الأقساط المتأخرة','upcoming-installments':'الأقساط القادمة','upcoming-checks':'الشيكات القادمة','plot-profitability':'ربحية القطع'};
  main.innerHTML+=`<div id="rep-result" style="margin-top:18px"><div style="padding:24px;text-align:center;color:var(--tx3)">⏳ جاري التحميل...</div></div>`;
  try{
    const data=await api(`/aradi/reports/${type}`);
    let html='';
    if(type==='buyer-balances'){
      html=`<div class="tw"><table><thead><tr><th>المشتري</th><th>رقم القطعة</th><th>العقد</th><th>سعر البيع</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th></tr></thead><tbody>
        ${data.length?data.map(r=>`<tr><td><strong>${esc(r.buyer_name)}</strong></td><td>${esc(r.plot_number||'—')}</td><td>${esc(r.contract_number||'—')}</td><td>${cur(r.sale_price)}</td><td style="color:var(--gr)">${cur(r.total_paid)}</td><td style="color:var(--rd);font-weight:700">${cur(r.remaining)}</td><td>${statusBadge(r.contract_status)}</td></tr>`).join(''):`<tr class="empty"><td colspan="7">لا توجد بيانات</td></tr>`}
      </tbody></table></div>`;
    } else if(type==='investor-balances'){
      html=`<div class="tw"><table><thead><tr><th>المستثمر</th><th>القطعة</th><th>رأس المال</th><th>الربح</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th></tr></thead><tbody>
        ${data.length?data.map(r=>`<tr><td><strong>${esc(r.investor_name)}</strong></td><td>${esc(r.plot_number||'—')}</td><td>${cur(r.capital_amount)}</td><td>${cur(r.profit_amount)}</td><td>${cur(r.total_due)}</td><td style="color:var(--gr)">${cur(r.total_paid_out)}</td><td style="color:var(--rd);font-weight:700">${cur(r.remaining_to_pay)}</td></tr>`).join(''):`<tr class="empty"><td colspan="7">لا توجد بيانات</td></tr>`}
      </tbody></table></div>`;
    } else if(type==='overdue-installments'||type==='upcoming-installments'){
      html=`<div class="tw"><table><thead><tr><th>المشتري</th><th>القطعة</th><th>رقم القسط</th><th>تاريخ الاستحقاق</th><th>القيمة</th><th>المدفوع</th><th>المتبقي</th></tr></thead><tbody>
        ${data.length?data.map(r=>`<tr><td><strong>${esc(r.buyer_name)}</strong></td><td>${esc(r.plot_number||'—')}</td><td>${r.installment_number}</td><td>${fmtDate(r.due_date)}</td><td>${cur(r.amount)}</td><td>${cur(r.paid)}</td><td style="color:var(--rd);font-weight:700">${cur(r.remaining)}</td></tr>`).join(''):`<tr class="empty"><td colspan="7">لا توجد بيانات</td></tr>`}
      </tbody></table></div>`;
    } else if(type==='upcoming-checks'){
      html=`<div class="tw"><table><thead><tr><th>رقم الشيك</th><th>الاسم</th><th>الاتجاه</th><th>القيمة</th><th>تاريخ الشيك</th><th>الحالة</th></tr></thead><tbody>
        ${data.length?data.map(r=>`<tr><td>${esc(r.check_number||'—')}</td><td>${esc(r.person_name||'—')}</td><td>${dirLabel(r.direction)}</td><td>${cur(r.amount)}</td><td>${fmtDate(r.check_date)}</td><td>${statusBadge(r.status)}</td></tr>`).join(''):`<tr class="empty"><td colspan="6">لا توجد بيانات</td></tr>`}
      </tbody></table></div>`;
    } else if(type==='plot-profitability'){
      html=`<div class="tw"><table><thead><tr><th>رقم القطعة</th><th>المشروع</th><th>الحالة</th><th>إيرادات المشترين</th><th>مدفوعات المستثمرين</th><th>المصاريف</th><th>صافي الربح</th></tr></thead><tbody>
        ${data.length?data.map(r=>`<tr><td><strong>${esc(r.plot_number)}</strong></td><td>${esc(r.project_name||'—')}</td><td>${statusBadge(r.status)}</td><td>${cur(r.total_buyer_payments)}</td><td>${cur(r.total_investor_payouts)}</td><td>${cur(r.total_expenses)}</td><td style="font-weight:700;color:${parseFloat(r.net_profit||0)>=0?'var(--gr)':'var(--rd)'}">${cur(r.net_profit)}</td></tr>`).join(''):`<tr class="empty"><td colspan="7">لا توجد بيانات</td></tr>`}
      </tbody></table></div>`;
    }
    document.getElementById('rep-result').innerHTML=`
      <div class="ph"><div style="font-size:15px;font-weight:700">${titles[type]||''} <span style="font-size:12px;color:var(--tx3);font-weight:400">(${data.length} سجل)</span></div>

  }catch(e){
    document.getElementById('rep-result').innerHTML=`<div style="color:var(--rd);padding:16px">⚠️ ${esc(e.message)}</div>`;
  }

document.addEventListener('DOMContentLoaded',()=>{
  const token=getToken(); const user=getUser();
  if(token&&user){
    if(!['admin','accountant'].includes(user.role)){
      localStorage.removeItem('aradi_token'); localStorage.removeItem('aradi_user');
      location.href='portal.html'; return;
    }
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    const roleMap={admin:'مدير عام',accountant:'محاسب'};
    document.getElementById('who').textContent=`${user.full_name||user.username} — ${roleMap[user.role]||user.role}`;
    renderSidebar(); loadDashboard();
  } else {
    location.href='portal.html';
  }
});

  const err=document.getElementById('login-err'); err.textContent='';
  if(!u||!p){ err.textContent='الرجاء تعبئة جميع الحقول'; return; }
  const btn=document.getElementById('login-btn'); btn.disabled=true; btn.textContent='جاري التحقق...';
  try{
    const res=await fetch(`${API_BASE}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data=await res.json().catch(()=>null);
    if(!res.ok||!data?.token) throw new Error(data?.detail||'بيانات الدخول غير صحيحة');
    if(!['admin','accountant'].includes(data.user.role)) throw new Error('هذا الحساب لا يملك صلاحية الوصول لقسم الأراضي');
    localStorage.setItem('aradi_token',data.token); localStorage.setItem('aradi_user',JSON.stringify(data.user));
    location.reload();
  }catch(e){ err.textContent=e.message; }
  finally{ btn.disabled=false; btn.textContent='تسجيل الدخول'; }
});

document.getElementById('lu').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('login-btn').click(); });
document.getElementById('lp').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('login-btn').click(); });
</script>
</body>
</html>
