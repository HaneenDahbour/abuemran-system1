providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "cd backend-py && python3 -m pip install --upgrade pip",
  "cd backend-py && python3 -m pip install -r requirements.txt"
]

[start]
cmd = "cd backend-py && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
